<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus — blocked</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: oklch(0.145 0 0);
        --fg: oklch(0.985 0 0);
        --muted: oklch(0.708 0 0);
        --border: oklch(1 0 0 / 12%);
        --accent: oklch(0.627 0.265 303.9);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          ui-sans-serif, system-ui, sans-serif;
        background: var(--bg);
        color: var(--fg);
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(100%, 420px);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px 20px 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      h1 {
        font-size: 1.125rem;
        font-weight: 600;
        margin: 0;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0;
        font-size: 0.875rem;
        color: var(--muted);
        line-height: 1.45;
      }
      .url {
        font-size: 0.75rem;
        word-break: break-all;
        color: var(--fg);
        opacity: 0.85;
      }
      button {
        margin-top: 4px;
        align-self: flex-start;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--fg);
        font-size: 0.875rem;
        font-weight: 500;
        padding: 8px 14px;
        cursor: pointer;
      }
      button:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>This tab is off-focus</h1>
      <p>
        Session goal: <strong id="goal">—</strong>
      </p>
      <p class="url" id="target">—</p>
      <p>
        Allow this site once for the rest of this session, then go back.
      </p>
      <button type="button" id="allow">Allow once &amp; continue</button>
    </div>
    <script src="/blocked.js"></script>
  </body>
</html>
